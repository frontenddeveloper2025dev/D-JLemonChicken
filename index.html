<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&amp;J Lemon Chicken</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Playfair+Display:wght@700;900&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
      body {
        font-family: "DM Sans", sans-serif;
      }
      .font-display {
        font-family: "Playfair Display", serif;
      }
      .fade-in {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.7s, transform 0.7s;
      }
      .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .hero-overlay {
        background: linear-gradient(
          135deg,
          rgba(38, 79, 43, 0.85),
          rgba(38, 79, 43, 0.6)
        );
      }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
  </head>
  <body data-template-id="__page-root" class="w-full">
    <!-- Hero -->
    <section
      class="relative"
      style="min-height: calc(85 * min(var(--vh, 1vh), 1vh))"
    >
      <img
        data-template-id="hero-img"
        class="canva-image absolute inset-0 w-full h-full object-cover"
        loading="lazy"
      />
      <div class="hero-overlay absolute inset-0"></div>
      <div
        class="relative z-10 flex flex-col items-center justify-center text-center px-4 sm:px-6 py-12 sm:py-20"
        style="min-height: calc(85 * min(var(--vh, 1vh), 1vh))"
      >
        <p class="text-5xl sm:text-6xl mb-3 sm:mb-4">🍋</p>
        <h1
          data-template-id="hero-title"
          class="canva-text font-display text-white text-3xl sm:text-5xl leading-tight"
        ></h1>
        <p
          data-template-id="hero-slogan"
          class="canva-text mt-3 sm:mt-4 text-base sm:text-xl md:text-2xl max-w-xs sm:max-w-md"
        ></p>
        <a
          href="#about"
          data-template-id="hero-cta"
          class="canva-button mt-6 sm:mt-8 inline-block px-6 sm:px-8 py-2 sm:py-3 rounded-full font-semibold text-base sm:text-lg transition hover:scale-105 active:scale-95"
        ></a>
      </div>
    </section>
    <!-- About -->
    <section id="about" class="py-12 sm:py-20 px-4 sm:px-6">
      <div
        class="max-w-5xl mx-auto grid md:grid-cols-2 gap-8 sm:gap-12 items-center"
      >
        <div class="fade-in">
          <img
            data-template-id="about-img"
            class="canva-image w-full h-64 sm:h-80 object-cover rounded-2xl shadow-lg"
            loading="lazy"
          />
        </div>
        <div class="fade-in">
          <h2
            data-template-id="about-title"
            class="canva-text font-display mb-3 sm:mb-4 text-2xl sm:text-3xl"
          ></h2>
          <p
            data-template-id="about-text"
            class="canva-text leading-relaxed text-sm sm:text-base"
          ></p>
        </div>
      </div>
    </section>
    <!-- Products -->
    <section
      data-template-id="products-section"
      class="canva-section py-12 sm:py-20 px-4 sm:px-6"
    >
      <div class="max-w-5xl mx-auto text-center">
        <h2
          data-template-id="products-title"
          class="canva-text font-display mb-8 sm:mb-12 text-2xl sm:text-3xl"
        ></h2>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
          <div
            data-template-id="product-1"
            class="canva-card rounded-xl p-4 sm:p-6 fade-in shadow-md"
          >
            <p class="text-2xl sm:text-3xl mb-2 sm:mb-3">🍗</p>
            <h3
              data-template-id="product-1-name"
              class="canva-text font-semibold text-sm sm:text-base"
            ></h3>
          </div>
          <div
            data-template-id="product-2"
            class="canva-card rounded-xl p-4 sm:p-6 fade-in shadow-md"
          >
            <p class="text-2xl sm:text-3xl mb-2 sm:mb-3">🍋</p>
            <h3
              data-template-id="product-2-name"
              class="canva-text font-semibold text-sm sm:text-base"
            ></h3>
          </div>
          <div
            data-template-id="product-3"
            class="canva-card rounded-xl p-4 sm:p-6 fade-in shadow-md"
          >
            <p class="text-2xl sm:text-3xl mb-2 sm:mb-3">🥖</p>
            <h3
              data-template-id="product-3-name"
              class="canva-text font-semibold text-sm sm:text-base"
            ></h3>
          </div>
          <div
            data-template-id="product-4"
            class="canva-card rounded-xl p-4 sm:p-6 fade-in shadow-md"
          >
            <p class="text-2xl sm:text-3xl mb-2 sm:mb-3">🫓</p>
            <h3
              data-template-id="product-4-name"
              class="canva-text font-semibold text-sm sm:text-base"
            ></h3>
          </div>
          <div
            data-template-id="product-5"
            class="canva-card rounded-xl p-4 sm:p-6 fade-in shadow-md"
          >
            <p class="text-2xl sm:text-3xl mb-2 sm:mb-3">🧀</p>
            <h3
              data-template-id="product-5-name"
              class="canva-text font-semibold text-sm sm:text-base"
            ></h3>
          </div>
          <div
            data-template-id="product-6"
            class="canva-card rounded-xl p-4 sm:p-6 fade-in shadow-md"
          >
            <p class="text-2xl sm:text-3xl mb-2 sm:mb-3">🥩</p>
            <h3
              data-template-id="product-6-name"
              class="canva-text font-semibold text-sm sm:text-base"
            ></h3>
          </div>
        </div>
        <img
          data-template-id="products-img"
          class="canva-image mt-8 sm:mt-12 w-full h-48 sm:h-64 object-cover rounded-2xl shadow-lg"
          loading="lazy"
        />
      </div>
    </section>
    <!-- Mission/Vision/Values -->
    <section class="py-12 sm:py-20 px-4 sm:px-6">
      <div class="max-w-5xl mx-auto">
        <div class="grid md:grid-cols-3 gap-6 sm:gap-8">
          <div
            data-template-id="mission-card"
            class="canva-card rounded-xl p-6 sm:p-8 fade-in shadow-md"
          >
            <p class="text-xl sm:text-2xl mb-2 sm:mb-3">🌿</p>
            <h3
              data-template-id="mission-title"
              class="canva-text font-display mb-2 sm:mb-3 text-lg sm:text-xl"
            ></h3>
            <p
              data-template-id="mission-text"
              class="canva-text leading-relaxed text-sm sm:text-base"
            ></p>
          </div>
          <div
            data-template-id="vision-card"
            class="canva-card rounded-xl p-6 sm:p-8 fade-in shadow-md"
          >
            <p class="text-xl sm:text-2xl mb-2 sm:mb-3">✨</p>
            <h3
              data-template-id="vision-title"
              class="canva-text font-display mb-2 sm:mb-3 text-lg sm:text-xl"
            ></h3>
            <p
              data-template-id="vision-text"
              class="canva-text leading-relaxed text-sm sm:text-base"
            ></p>
          </div>
          <div
            data-template-id="values-card"
            class="canva-card rounded-xl p-6 sm:p-8 fade-in shadow-md"
          >
            <p class="text-xl sm:text-2xl mb-2 sm:mb-3">💛</p>
            <h3
              data-template-id="values-title"
              class="canva-text font-display mb-2 sm:mb-3 text-lg sm:text-xl"
            ></h3>
            <p
              data-template-id="values-text"
              class="canva-text leading-relaxed text-sm sm:text-base"
            ></p>
          </div>
        </div>
      </div>
    </section>
    <!-- Footer -->
    <footer
      data-template-id="footer-section"
      class="canva-footer py-12 px-4 sm:px-6 text-center"
    >
      <p class="text-3xl sm:text-4xl mb-3 sm:mb-4">🍋</p>
      <h2
        data-template-id="footer-brand"
        class="canva-text font-display mb-1 sm:mb-2 text-xl sm:text-2xl"
      ></h2>
      <p
        data-template-id="footer-slogan"
        class="canva-text text-sm sm:text-base"
      ></p>
      <p
        data-template-id="footer-address"
        class="canva-text mt-3 sm:mt-4 text-xs sm:text-sm"
      ></p>
      <p
        data-template-id="footer-credit"
        class="canva-text mt-4 sm:mt-6 text-xs sm:text-sm opacity-70"
      ></p>
    </footer>
    <script src="/_sdk/editing_sdk.js"></script>
    <script>
      lucide.createIcons();
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) e.target.classList.add("visible");
          });
        },
        { threshold: 0.1 }
      );
      document
        .querySelectorAll(".fade-in")
        .forEach((el) => observer.observe(el));
    </script>

  </body>
</html>
